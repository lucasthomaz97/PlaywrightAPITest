name: CI
on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  test:
    runs-on: ubuntu-latest

    services:
      postgres:
        image: postgres:16
        env:
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: postgres
          POSTGRES_DB: ecommerce
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    env:
      DB_HOST: localhost
      DB_PORT: 5432
      DB_USER: postgres
      DB_PASSWORD: postgres
      DB_NAME: ecommerce
      PLAYWRIGHT_SKIP_BROWSER_DOWNLOAD: 1

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - run: npm ci

      - name: Start API
        run: |
          npx tsx api/src/server.ts &
          sleep 2
          for i in $(seq 1 30); do
            curl -s http://localhost:3000/ > /dev/null 2>&1 && echo "API ready" && break
            echo "Waiting for API... attempt $i"
            sleep 2
          done

      - run: npx playwright test
